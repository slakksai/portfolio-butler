name: refresh-and-deploy

# 云端投资管家: 工作日定时跑引擎刷新行情 → 发布 GitHub Pages。
# 也在 push 到 main 时重新发布(代码改动)。可在 Actions 页手动 Run。

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 工作日 01:00 UTC = 北京时间 09:00
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write   # 把刷新后的 data/latest.json 提交回仓库(审计留痕)
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 刷新今日快照数据
        run: node engine/build-data.mjs

      - name: 刷新回测数据(自2014净值/回撤/逐年/危机)
        run: node engine/build-backtest.mjs

      - name: 提交数据回仓库(审计留痕, 失败不阻断发布)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/backtest.json
          git diff --staged --quiet || (git commit -m "data: refresh $(date -u +%F)" && git push)

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
